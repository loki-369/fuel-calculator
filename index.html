<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Paisa — Smart Fuel Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        .input-card {
            background: white;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }

        .input-card:focus-within {
            border-color: #000;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        input:focus {
            outline: none;
        }

        /* Remove arrows/spinners from number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .currency-pill {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-lg">
        <!-- Branding -->
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-gray-900 uppercase">Petrol Paisa</h1>
                <p class="text-gray-500 font-medium">Trip expense intelligence.</p>
            </div>
            <div class="text-right">
                <span class="bg-gray-200 text-gray-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">v2.0</span>
            </div>
        </header>

        <div class="space-y-6">
            <!-- Currency Selection -->
            <div class="flex items-center justify-between p-4 bg-white border border-gray-200 rounded-2xl shadow-sm">
                <label class="text-sm font-semibold text-gray-600">Primary Currency</label>
                <select id="currency" onchange="calculate()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-black focus:border-black block p-2 font-bold">
                    <option value="INR" selected>INR (₹)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>

            <!-- Inputs -->
            <div class="grid grid-cols-1 gap-4">
                <div class="input-card p-5 rounded-2xl">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Total Distance</label>
                    <div class="flex items-center">
                        <input type="number" id="distance" value="100" oninput="calculate()" class="w-full text-2xl font-bold bg-transparent">
                        <span class="text-gray-900 font-bold ml-2">KM</span>
                    </div>
                </div>

                <div class="input-card p-5 rounded-2xl">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Mileage (Efficiency)</label>
                    <div class="flex items-center">
                        <input type="number" id="efficiency" value="15" oninput="calculate()" class="w-full text-2xl font-bold bg-transparent">
                        <span class="text-gray-900 font-bold ml-2 text-sm whitespace-nowrap">KM / L</span>
                    </div>
                </div>

                <div class="input-card p-5 rounded-2xl">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Fuel Price</label>
                    <div class="flex items-center">
                        <span id="symbol-input" class="text-gray-900 text-2xl font-bold mr-1">₹</span>
                        <input type="number" id="price" value="100" oninput="calculate()" class="w-full text-2xl font-bold bg-transparent">
                    </div>
                </div>
            </div>

            <!-- Result Box (High Contrast) -->
            <div class="bg-black rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-[0.2em] mb-2">Estimated Expense</p>
                    <div class="flex items-baseline">
                        <span id="symbol-result" class="text-3xl font-light mr-2 text-gray-400">₹</span>
                        <span id="total-cost" class="text-6xl font-black tracking-tighter">0.00</span>
                    </div>
                    
                    <div class="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                        <div>
                            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Fuel Consumption</p>
                            <p class="text-xl font-bold"><span id="fuel-liters">0.0</span> <span class="text-xs text-gray-500">LITERS</span></p>
                        </div>
                        <div class="h-10 w-10 bg-white/5 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em]">Petrol Paisa Utility</p>
        </footer>
    </div>

    <script>
        const symbols = {
            INR: '₹',
            USD: '$',
            EUR: '€',
            GBP: '£'
        };

        function calculate() {
            const distance = parseFloat(document.getElementById('distance').value) || 0;
            const efficiency = parseFloat(document.getElementById('efficiency').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const currency = document.getElementById('currency').value;

            // Update UI Symbols
            document.getElementById('symbol-input').innerText = symbols[currency];
            document.getElementById('symbol-result').innerText = symbols[currency];

            // Math
            if (efficiency > 0) {
                const litersNeeded = distance / efficiency;
                const totalCost = litersNeeded * price;

                // Update Values with localized formatting
                document.getElementById('total-cost').innerText = totalCost.toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                document.getElementById('fuel-liters').innerText = litersNeeded.toFixed(2);
            } else {
                document.getElementById('total-cost').innerText = "0.00";
                document.getElementById('fuel-liters').innerText = "0.00";
            }
        }

        // Run on load
        calculate();
    </script>
</body>
</html>
