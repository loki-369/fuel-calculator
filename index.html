<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuel Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1>⛽ Fuel Calculator</h1>

  <div class="input-group">
    <label>Distance</label>
    <input type="number" id="distance" placeholder="Enter distance">
    <select id="distanceUnit">
      <option value="km">KM</option>
      <option value="miles">Miles</option>
    </select>
  </div>

  <div class="input-group">
    <label>Fuel Efficiency</label>
    <input type="number" id="efficiency" placeholder="e.g. 15">
    <select id="effUnit">
      <option value="kml">KM/L</option>
      <option value="mpg">MPG</option>
    </select>
  </div>

  <div class="input-group">
    <label>Fuel Price (per litre)</label>
    <input type="number" id="price" placeholder="e.g. 100">
  </div>

  <button onclick="calculateFuel()">Calculate</button>

  <div class="result">
    <p id="fuelNeeded">Fuel Needed: --</p>
    <p id="totalCost">Total Cost: --</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
